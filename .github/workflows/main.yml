name: Generate Snake Animation

on:
  schedule: 
    - cron: "0 */12 * * *"  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: seu-usuario
          outputs: dist/snake.svg

      - name: Push to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: snake
          path: dist/snake.svg
